[main]
bot_id = 123456789
streamer_id = 123456789
admin_id = 123456789

db = postgres://localhost/dankbot?sslmode=disable&options=-csearch_path%3Ddankbot_streamername

[web]
public_url = http://example.com
bind_addr = 127.0.0.1:3000
cors_allowed_origins = http://127.0.0.1:3000,http://localhost:3000

[redis]
addr = 127.0.0.1:6379
db = 0
; set a unique prefix per service/install if multiple bots share one redis instance
key_prefix = dankbot

[updown]
; args: bot = bot name, ver = version, streamer = streamer name
up = {bot} {ver} is up for {streamer}!
down = {bot} {ver} is leaving {streamer}s chat... Bye!

[twitch]
client_id = your_twitch_client_id
client_secret = your_twitch_client_secret
; irc = default chat send path, helix = send via Send Chat Message API
send_transport = irc
; site login callback, defaults to <public_url>/authorized
;redirect_uri = http://example.com/authorized
; streamer/bot connect callback, defaults to <public_url>/connected
;connect_redirect_uri = http://example.com/connected

[twitch_eventsub]
enabled = 0
transport = webhook
secret = your_twitch_eventsub_secret
; will override default <public_url>/authorized
;callback_url = https://example.com/authorized
; used when transport = websocket, defaults to wss://eventsub.wss.twitch.tv/ws
;websocket_url = wss://eventsub.wss.twitch.tv/ws
sync_interval = 5m
dedupe_ttl = 24h

[openai]
enabled = 0
api_key = your_openai_api_key
model = gpt-5-nano
timeout = 5s
keyword_validation = 1

[spotify]
enabled = 0

client_id = your_spotify_client_id
client_secret = your_spotify_client_secret
; will override default <public_url>/connected
;redirect_uri = http://example.com/connected

;if discord is enabled you can enable this feature to log all requests to the spotify api endpoints and chat commands
;1=enabled, 0=disabled
log_spotify_requests = 0

[roblox]
enabled = 0

cookie = your_.ROBLOSECURITY_cookie

client_id = your_roblox_client_id
client_secret = your_roblox_client_secret
; will override default <public_url>/connected
;redirect_uri = http://example.com/connected

[steam]
; optional public-site enrichment for non-Roblox streams
api_key = your_steam_api_key
user_id = your_steam_user_id

[discord]
enabled = 0

client_id = your_discord_client_id
client_secret = your_discord_client_secret
; will override default <public_url>/joined
;redirect_uri = http://example.com/joined

bot_token = your_discord_bot_token

mod_role_id = 123456789

[streamlabs]
enabled = 0
client_id = your_streamlabs_client_id
client_secret = your_streamlabs_client_secret
; will override default <public_url>/connected
;redirect_uri = http://example.com/connected

[streamelements]
enabled = 0
client_id = your_streamelements_client_id
client_secret = your_streamelements_client_secret
; will override default <public_url>/connected
;redirect_uri = http://example.com/connected

[worker]
; optional for standalone per-config bot services
instance_id = dankbot-worker-1
lease_ttl = 30s
heartbeat_interval = 10s
