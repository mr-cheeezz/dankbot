[main]
bot_id = 123456789
streamer_id = 123456789
admin_id = 123456789

db = postgres://localhost/dankbot?sslmode=disable&options=-csearch_path%3Ddankbot_streamername

[web]
public_url = http://example.com
bind_addr = 127.0.0.1:8536
cors_allowed_origins = http://127.0.0.1:3000,http://localhost:3000

[redis]
addr = 127.0.0.1:6378
db = 0
key_prefix = dankbot

[updown]
; args: bot = bot name, ver = version, streamer = streamer name
up = {bot} {ver} is up for {streamer}!
down = {bot} {ver} is leaving {streamer}s chat... Bye!

[twitch]
client_id = your_twitch_client_id
client_secret = your_twitch_client_secret
; will override default <public_url>/twitch/callback
;redirect_uri = http://example.com/twitch/callback

[spotify]
enabled = 0

client_id = your_spotify_client_id
client_secret = your_spotify_client_secret
; will override default <public_url>/spotify/callback
;redirect_uri = http://example.com/spotify/callback

;if discord is enabled you can enable this feature to log all requests to the spotify api endpoints and chat commands
;1=enabled, 0=disabled
log_spotify_requests = 0
spotify_logging_channel_id = 123456789

[roblox]
enabled = 0

cookie = your_.ROBLOSECURITY_cookie

client_id = your_roblox_client_id
client_secret = your_roblox_client_secret
; will override default <public_url>/roblox/callback
;redirect_uri = http://example.com/roblox/callback 

[discord]
enabled = 0

client_id = your_discord_client_id
client_secret = your_discord_client_secret
; will override default <public_url>/discord/callback
;redirect_uri = http://example.com/discord/callback

bot_token = your_discord_bot_token

logs_channel_id = 123456789
role_ping_channel_id = 123456789

mod_role_id = 123456789

[alerts]
; for chat alerts depending on weather you use streamlabs or streamelements
; enter the tokens for the follow of which you use if blank or comented this feature will be disabled

;streamlabs_token = your_streamlabs_token
;streeamlabs_socket = your_streamlabs_socket_token

;streamelements_token = your_streamelements_token

[worker]
instance_id = dankbot-worker-1
lease_ttl = 30s
heartbeat_interval = 10s
